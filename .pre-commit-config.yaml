# Simplified pre-commit hooks for WSL2/Windows compatibility
repos:
  # Basic file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace
        exclude: |
          (?x)^(
              node_modules/|
              api/node_modules/|
              \.git/
          )
      - id: end-of-file-fixer
        exclude: |
          (?x)^(
              node_modules/|
              api/node_modules/|
              \.git/
          )
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']

  # Shell script linting
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.9.0.5
    hooks:
      - id: shellcheck
        args: [--severity=warning]
        exclude: |
          (?x)^(
              node_modules/|
              api/node_modules/
          )

  # Python formatting
  - repo: https://github.com/psf/black
    rev: 23.7.0
    hooks:
      - id: black
        exclude: |
          (?x)^(
              node_modules/|
              api/node_modules/
          )

# Global excludes for WSL2 compatibility
exclude: |
  (?x)^(
      node_modules/|
      api/node_modules/|
      \.git/|
      dashboard/node_modules/|
      logs/|
      npm_proxy_snapshot/|
      repos/|
      audit-history/|
      gitops_deploy_.*\.tar\.gz$
  )
# Append this stanza to a repo's existing `.pre-commit-config.yaml`.
# If the repo has no pre-commit config yet, see `pre-commit-config.minimal.yaml`
# in this directory for a complete starter file.
#
# Pin: v8.21.2 (gitleaks). Bump centrally in
# `operations/templates/gitleaks/.pre-commit-config-fragment.yaml`,
# then re-roll across submodules via the README procedure.

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        args: ["--config=.gitleaks.toml"]
