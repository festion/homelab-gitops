name: GitOps Audit and Quality Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run daily at 3:00 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  lint-and-validate:
    name: Code Quality Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            dashboard/package-lock.json
            api/package-lock.json

      - name: Install root dependencies
        run: npm ci --only=dev

      - name: Install API dependencies
        run: |
          cd api
          npm ci

      - name: Install dashboard dependencies
        run: |
          cd dashboard
          npm ci

      - name: Lint dashboard code
        run: |
          cd dashboard
          npm run lint

      - name: TypeScript compilation check
        run: |
          cd dashboard
          npx tsc -b

      - name: Build dashboard for production
        run: |
          cd dashboard
          npm run build

      - name: Validate shell scripts
        run: |
          # Install shellcheck for shell script validation
          sudo apt-get update
          sudo apt-get install -y shellcheck
          
          # Check all shell scripts
          find scripts -name "*.sh" -type f -exec shellcheck {} \;

      - name: Validate JSON files
        run: |
          # Validate existing JSON files
          find . -name "*.json" -type f -exec python3 -m json.tool {} \; > /dev/null

  comprehensive-audit:
    name: Repository Mismatch Detection
    runs-on: ubuntu-latest
    needs: lint-and-validate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up required tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl git

      - name: Run comprehensive audit (simulation)
        env:
          LOCAL_GIT_ROOT: /tmp/git-simulation
        run: |
          # Create simulation of C:\GIT structure for testing
          mkdir -p /tmp/git-simulation

          # Simulate some repositories
          git clone --depth 1 https://github.com/festion/homelab-gitops-auditor.git /tmp/git-simulation/homelab-gitops-auditor
          git clone --depth 1 https://github.com/festion/ESPHome.git /tmp/git-simulation/ESPHome || true

          # Run the audit script directly (LOCAL_GIT_ROOT set via env)
          bash scripts/comprehensive_audit.sh --dev

      - name: Upload audit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: audit-report
          path: audit-history/
          retention-days: 30

  security-scan:
    name: Security and Dependencies Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies and audit
        run: |
          cd dashboard
          npm ci
          npm audit --audit-level=moderate
          
          cd ../api
          npm ci
          npm audit --audit-level=moderate

      - name: Check for sensitive files
        run: |
          # Check for common sensitive file patterns
          if find . -name "*.env*" -o -name "*.key" -o -name "*.pem" -o -name "*password*" | grep -v node_modules | grep -q .; then
            echo "⚠️ Potentially sensitive files found"
            find . -name "*.env*" -o -name "*.key" -o -name "*.pem" -o -name "*password*" | grep -v node_modules
          else
            echo "✅ No sensitive files detected"
          fi

  create-issues-for-findings:
    name: Create GitHub Issues for Real Findings
    runs-on: ubuntu-latest
    needs: comprehensive-audit
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download audit results
        uses: actions/download-artifact@v4
        with:
          name: audit-report
          path: audit-history/

      - name: Process audit results and create issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -f "audit-history/latest.json" ]; then
            echo "No audit report found, skipping"
            exit 0
          fi

          # Count only actionable findings (exclude missing — expected in CI simulation)
          dirty=$(jq -r '.summary.dirty' audit-history/latest.json)
          extra=$(jq -r '.summary.extra' audit-history/latest.json)
          mismatched=$(jq -r '.summary.mismatched' audit-history/latest.json)
          actionable=$((dirty + extra + mismatched))

          if [ "$actionable" -eq 0 ]; then
            echo "No actionable findings (dirty/extra/mismatched). Skipping issue creation."
            exit 0
          fi

          # Check for existing open audit issue to avoid duplicates
          existing=$(gh issue list --label "audit" --state open --json number --jq 'length')
          if [ "$existing" -gt 0 ]; then
            echo "Open audit issue already exists, skipping duplicate creation."
            exit 0
          fi

          # Build issue body with only actionable findings
          issue_title="GitOps Audit: actionable findings - $(date +%Y-%m-%d)"
          body="## Actionable Audit Findings\n\n"
          body+="| Category | Count |\n|----------|-------|\n"
          [ "$dirty" -gt 0 ] && body+="| Dirty (uncommitted changes) | $dirty |\n"
          [ "$extra" -gt 0 ] && body+="| Extra (local only) | $extra |\n"
          [ "$mismatched" -gt 0 ] && body+="| Mismatched (remote conflicts) | $mismatched |\n"
          body+="\n### Affected Repositories\n\n"

          # List only actionable repos (dirty, extra, mismatched)
          body+=$(jq -r '.repos[] | select(.status == "dirty" or .status == "extra" or .status == "mismatched") | "- **\(.name)**: \(.status) — \(.mitigation)"' audit-history/latest.json)

          body+="\n\n> Auto-created by GitOps Audit workflow. Missing repos are excluded (expected in CI simulation)."

          echo -e "$body" | gh issue create \
            --title "$issue_title" \
            --body-file - \
            --label "audit,automation"
